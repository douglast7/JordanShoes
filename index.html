<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JordanShoes</title>
    <link rel="stylesheet" href="./index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="desconto">
      <p>Ganhe R$ 10,00 de desconto no frete</p>
    </div>
    <header class="jordanshoes-logo-bg">
      <a href="#">
        <h2>JordanShoes</h2>
      </a>
    </header>
    <main>
      <section class="jordanshoes-banner">
        <img
          src="./assets/Air-Jordan-1-Retro-High-OG-Wmns-TWIST-Feminino 1.svg"
          alt=""
        />
      </section>
      <section class="jordanshoes-banner-text">
        <div class="jordanshoes-text">
          <h2>A melhor loja de Jordan</h2>
          <!-- Ajeitar o responsivo do texto -->
          <p>
            O tênis Jordan é fruto de uma velha e forte parceria entre a Nike e
            o jogador Michael Jordan.
          </p>
        </div>
      </section>
    </main>

    <section class="galeria-container">
      <div class="galeria-text">
        <h1>Destaques</h1>
        <p>
          Frete grátis e chinelo de brinde é aqui, aproveite por tempo limitado.
        </p>
      </div>

      <section class="galeria-jordan">
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-mid-dutch-green-1-400.svg"
            alt="Jordan Green"
          />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-high-zoom-cmft-tropical-twist-1-400.svg"
            alt=""
          />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-mid-black-noble-red-w-1-1000.svg"
            alt=""
          />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-mid-bright-citrus-1-1000 1.svg"
            alt=""
          />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-mid-carbon-fiber-1-1000 1.svg"
            alt=""
          />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-retro-high-court-purple-w-1-400.svg"
            alt=""
          />
        </div>
        <div class="galeria-bg">
          <img src="./assets/air-jordan-1-mid-grey-camo-1-1000 1.svg" alt="" />
        </div>
        <div class="galeria-bg">
          <img
            src="./assets/air-jordan-1-mid-light-smoke-grey-gs-1-1000.svg"
            alt=""
          />
        </div>
      </section>
    </section>

    <footer>
      <p>Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
